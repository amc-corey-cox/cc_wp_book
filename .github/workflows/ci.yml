name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango1.0-dev libcairo2-dev libgdk-pixbuf2.0-dev

      - name: Install project
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check src/ tests/

      - name: Run tests
        run: pytest --tb=short -q

  draft-pdf:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango1.0-dev libcairo2-dev libgdk-pixbuf2.0-dev

      - name: Install project
        run: pip install -e ".[dev]"

      - name: Cache Wikipedia article data
        uses: actions/cache@v4
        with:
          path: cache/
          key: wiki-draft-articles-v1

      - name: Fetch, render, and validate draft articles
        run: |
          cc-wp-book pipeline --draft
          cc-wp-book validate

      - name: Upload draft PDF artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: draft-pdfs
          path: output/*.pdf
          if-no-files-found: error
